<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势粒子交互 - 修复版</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #particle-canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            border-top: 4px solid #00d2ff; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <video id="input-video" style="display: none;" playsinline></video>

    <div id="loading">
        <div class="spinner"></div>
        <div id="status">正在加载 AI 模型...</div>
    </div>

    <!-- 使用 type="module" 直接导入 MediaPipe，解决 undefined 问题 -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12";

        const video = document.getElementById('input-video');
        const canvas = document.getElementById('particle-canvas');
        const status = document.getElementById('status');
        const ctx = canvas.getContext('2d');

        let handLandmarker;
        let gestureState = 'none';
        const particles = [];

        const NUM_PARTICLES = 2000;
        const SPHERE_RADIUS = 250;
        let centerX, centerY;

        // 粒子类
        class Particle {
            constructor() {
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos((Math.random() * 2) - 1);
                this.originX = SPHERE_RADIUS * Math.sin(phi) * Math.cos(theta);
                this.originY = SPHERE_RADIUS * Math.sin(phi) * Math.sin(theta);
                this.originZ = SPHERE_RADIUS * Math.cos(phi);
                this.reset();
            }
            reset() {
                this.x = this.originX; this.y = this.originY; this.z = this.originZ;
                this.vx = 0; this.vy = 0; this.vz = 0;
            }
            update() {
                if (gestureState === 'open') {
                    const d = Math.sqrt(this.x*this.x + this.y*this.y + this.z*this.z);
                    this.vx += (this.x/d) * 0.6; this.vy += (this.y/d) * 0.6; this.vz += (this.z/d) * 0.6;
                } else if (gestureState === 'fist') {
                    this.vx += (this.originX - this.x) * 0.3;
                    this.vy += (this.originY - this.y) * 0.3;
                    this.vz += (this.originZ - this.z) * 0.3;
                } else {
                    this.vx += (this.originX - this.x) * 0.01;
                    this.vy += (this.originY - this.y) * 0.01;
                    this.vz += (this.originZ - this.z) * 0.01;
                }
                this.vx *= 0.92; this.vy *= 0.92; this.vz *= 0.92;
                this.x += this.vx; this.y += this.vy; this.z += this.vz;
            }
            draw() {
                const fov = 800;
                const scale = fov / (fov + this.z);
                const x2d = this.x * scale + centerX;
                const y2d = this.y * scale + centerY;
                ctx.fillStyle = `rgba(100, 210, 255, ${scale - 0.2})`;
                ctx.beginPath();
                ctx.arc(x2d, y2d, Math.max(0.5, scale * 1.5), 0, 7);
                ctx.fill();
            }
        }

        async function start() {
            try {
                // 1. 初始化画布
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                centerX = canvas.width / 2;
                centerY = canvas.height / 2;
                for(let i=0; i<NUM_PARTICLES; i++) particles.push(new Particle());

                // 2. 加载手势识别
                status.textContent = "正在下载 AI 资源 (约为 5MB)...";
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
                );
                
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });

                // 3. 启动摄像头
                status.textContent = "请求摄像头权限...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.play();

                video.onloadeddata = () => {
                    document.getElementById('loading').style.display = 'none';
                    render();
                };
            } catch (err) {
                status.innerHTML = `<span style="color:#ff6b6b">错误: ${err.message}<br>请确保使用 HTTPS 或 Localhost 访问</span>`;
                console.error(err);
            }
        }

        let lastTime = -1;
        function render() {
            // 物理更新
            ctx.fillStyle = 'rgba(0, 5, 15, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (video.currentTime !== lastTime) {
                const result = handLandmarker.detectForVideo(video, performance.now());
                if (result.landmarks && result.landmarks.length > 0) {
                    const wrist = result.landmarks[0][0];
                    const tip = result.landmarks[0][8]; // 食指尖
                    const dist = Math.sqrt((wrist.x-tip.x)**2 + (wrist.y-tip.y)**2);
                    gestureState = dist < 0.25 ? 'fist' : 'open';
                } else {
                    gestureState = 'none';
                }
                lastTime = video.currentTime;
            }

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
        });

        start();
    </script>
</body>
</html>
